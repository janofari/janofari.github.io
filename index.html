<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estudio de Arquitectura</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
    }

    .carousel-item {
      height: 100vh;
      min-height: 100vh;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    .carousel-caption {
      bottom: 30%;
    }

    .menu-button {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1030;
      background: transparent;
      border: none;
      color: white;
      font-size: 2rem;
    }

    .text-overlay {
      font-size: 4rem;
      font-weight: bold;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .section-below {
      background-color: white;
      padding: 80px 20px;
      color: #333;
    }
  </style>
</head>
<body>

  <!-- Botón de menú fijo -->
  <button class="menu-button" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav" aria-controls="offcanvasNav">
    ☰
  </button>

  <!-- Offcanvas -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNav" aria-labelledby="offcanvasNavLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="offcanvasNavLabel">Menú</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
    </div>
    <div class="offcanvas-body">
      <nav class="nav flex-column">
        <a class="nav-link" href="#">Inicio</a>
        <a class="nav-link" href="#">Proyectos</a>
        <a class="nav-link" href="#">Sobre Nosotros</a>
        <a class="nav-link" href="#">Contacto</a>
      </nav>
    </div>
  </div>

  <!-- Carrusel a pantalla completa -->
  <div id="landingCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="5000">
    <div class="carousel-inner">
      <div class="carousel-item active" style="background-image: url('images/imagen_portada_1.jpg');">
        <div class="carousel-caption text-center">
          <h1 class="text-overlay">FRAN SILVESTRE<br>ARQUITECTOS</h1>
        </div>
      </div>
    </div>
  </div>

  <!-- Sección siguiente (texto y fondo blanco) -->
  <section class="section-below">
    <div class="container">
      <h2>Bienvenido a nuestro estudio</h2>
      <p>
        Somos un equipo de arquitectos comprometidos con el diseño contemporáneo, minimalista y funcional.
        Descubre nuestros proyectos y conoce nuestra filosofía.
      </p>
    </div>
  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
